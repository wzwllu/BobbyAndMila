<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的宝箱 - 大宝小宝积分系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 16px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .top-bar h2 { font-size: 20px; color: #333; }
        .balance-badge { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 10px 24px; border-radius: 25px; font-size: 18px; font-weight: bold; box-shadow: 0 3px 10px rgba(245,87,108,0.3); }
        .item-list { display: grid; gap: 16px; }
        .item-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .item-name { font-size: 18px; font-weight: 600; color: #333; }
        .item-meta { font-size: 13px; color: #999; margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
        .item-meta span { background: #f5f5f5; padding: 2px 10px; border-radius: 10px; }
        .item-actions { margin-left: 16px; }
        .apply-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 10px 24px; border-radius: 25px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .apply-btn:hover { opacity: 0.85; }
        .empty-message { text-align: center; color: #bbb; padding: 60px 20px; font-size: 16px; }
        .empty-message .big-icon { font-size: 64px; display: block; margin-bottom: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 28px; border-radius: 16px; width: 100%; max-width: 420px; margin: 0 16px; text-align: center; }
        .modal-content h3 { margin-bottom: 12px; }
        .modal-content p { color: #666; margin-bottom: 6px; font-size: 15px; }
        .modal-price { font-size: 24px; font-weight: bold; color: #f5576c; margin: 12px 0; }
        .modal-buttons { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
        .cancel-btn { background: #e0e0e0; color: #555; padding: 10px 24px; border: none; border-radius: 25px; font-size: 15px; cursor: pointer; font-weight: 600; }
        .confirm-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 10px 24px; border: none; border-radius: 25px; font-size: 15px; cursor: pointer; font-weight: 600; }
        .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .datetime-input { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; margin-top: 12px; font-family: inherit; }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 8px; padding: 15px; text-align: center; }
            .header h1 { font-size: 18px; }
            .container { margin: 12px auto; }
            .item-card { flex-direction: column; align-items: stretch; gap: 12px; }
            .item-actions { margin-left: 0; text-align: right; }
            .top-bar { flex-direction: column; align-items: flex-start; }
            .balance-badge { align-self: flex-start; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 我的宝箱</h1>
        <div class="nav-links">
            <a href="/worker">返回首页</a>
            <a href="/child/mall">返回商城</a>
            <a href="/logout">退出登录</a>
        </div>
    </div>

    <div class="container">
        <div class="top-bar">
            <h2>🎯 未核销的奖励</h2>
            <div class="balance-badge">⭐ <span id="pointsBalance">0</span> 积分</div>
        </div>

        <div class="item-list" id="itemList">
            <div class="empty-message" th:if="${items.isEmpty()}">
                <span class="big-icon">🎁</span>
                宝箱空空如也，快去商城兑换奖励吧！
            </div>
            <div class="item-card" th:each="item : ${items}">
                <div class="item-info">
                    <div class="item-name" th:text="${item.rewardName}">奖励名称</div>
                    <div class="item-meta">
                        <span th:text="'消耗 ' + ${item.totalPoints} + ' 积分'"></span>
                        <span th:text="'数量 x' + ${item.quantity}"></span>
                        <span th:if="${item.remark}" th:text="'备注: ' + ${item.remark}"></span>
                    </div>
                </div>
                <div class="item-actions">
                    <button class="apply-btn" th:attr="onclick='showApplyModal(' + ${item.id} + ', `' + ${item.rewardName} + '`, ' + ${item.totalPoints} + ')'">申请核销</button>
                </div>
            </div>
        </div>

        <div style="margin-top:20px;text-align:center;color:#aaa;font-size:13px;">
            💡 兑换后奖励存入宝箱，从宝箱提交使用时间后等待家长审核
        </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="modal-content">
            <h3 id="modalRewardName">奖励名称</h3>
            <p id="modalPoints" class="modal-price">0 积分</p>
            <p style="color:#999;font-size:13px;margin-bottom:4px;">选择你计划使用的时间</p>
            <input type="datetime-local" id="modalUsedAt" class="datetime-input">
            <div class="modal-buttons">
                <button onclick="hideApplyModal()" class="cancel-btn">取消</button>
                <button onclick="submitApply()" class="confirm-btn" id="confirmBtn">提交申请</button>
            </div>
        </div>
    </div>

    <script>
        let currentItemId = null;

        function showApplyModal(id, name, totalPoints) {
            currentItemId = id;
            document.getElementById('modalRewardName').textContent = name;
            document.getElementById('modalPoints').textContent = totalPoints + ' 积分';
            document.getElementById('modalUsedAt').value = '';
            document.getElementById('confirmBtn').disabled = false;
            document.getElementById('confirmBtn').textContent = '提交申请';
            document.getElementById('applyModal').style.display = 'flex';
        }

        function hideApplyModal() {
            document.getElementById('applyModal').style.display = 'none';
            currentItemId = null;
        }

        function submitApply() {
            const usedAt = document.getElementById('modalUsedAt').value;
            if (!usedAt) {
                alert('请选择使用时间');
                return;
            }

            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').textContent = '提交中...';

            fetch('/child/mall/treasure/' + currentItemId + '/request-verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usedAt: usedAt + ':00' })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    location.reload();
                } else {
                    alert(data.message || '操作失败');
                    document.getElementById('confirmBtn').disabled = false;
                    document.getElementById('confirmBtn').textContent = '提交申请';
                }
            })
            .catch(() => {
                alert('网络错误，请重试');
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('confirmBtn').textContent = '提交申请';
            });
        }

        fetch('/child/mall/balance')
            .then(r => r.json())
            .then(data => {
                document.getElementById('pointsBalance').textContent = data.balance;
            });
    </script>
</body>
</html>
