<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分商城 - 大宝小宝积分系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .top-bar h2 { font-size: 20px; color: #333; }
        .balance-badge { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 10px 24px; border-radius: 25px; font-size: 18px; font-weight: bold; box-shadow: 0 3px 10px rgba(245,87,108,0.3); }
        .reward-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .reward-card { background: white; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .reward-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .reward-icon { font-size: 48px; margin-bottom: 12px; }
        .reward-name { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .reward-desc { font-size: 13px; color: #999; margin-bottom: 12px; min-height: 18px; }
        .reward-price { font-size: 22px; font-weight: bold; color: #f5576c; margin-bottom: 4px; }
        .reward-price-label { font-size: 12px; color: #aaa; margin-bottom: 12px; }
        .reward-stock { font-size: 12px; color: #888; margin-bottom: 12px; }
        .redeem-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 10px 28px; border-radius: 25px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .redeem-btn:hover { opacity: 0.85; }
        .redeem-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .section-title { font-size: 18px; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        th { background: #fafafa; color: #555; font-weight: 600; }
        .status-pending { color: #f39c12; font-weight: 500; }
        .status-approved { color: #27ae60; font-weight: 500; }
        .status-rejected { color: #e74c3c; font-weight: 500; }
        .empty-message { text-align: center; color: #bbb; padding: 30px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 28px; border-radius: 16px; width: 100%; max-width: 420px; margin: 0 16px; text-align: center; }
        .modal-content h3 { margin-bottom: 12px; }
        .modal-content p { color: #666; margin-bottom: 6px; font-size: 15px; }
        .modal-price { font-size: 28px; font-weight: bold; color: #f5576c; margin: 12px 0; }
        .modal-buttons { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
        .cancel-btn { background: #e0e0e0; color: #555; padding: 10px 24px; border: none; border-radius: 25px; font-size: 15px; cursor: pointer; font-weight: 600; }
        .confirm-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 10px 24px; border: none; border-radius: 25px; font-size: 15px; cursor: pointer; font-weight: 600; }
        .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .remark-input { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; margin-top: 12px; font-family: inherit; resize: none; }
        .my-tab { background: white; border-radius: 12px; padding: 6px; display: inline-flex; margin-bottom: 16px; }
        .my-tab span { padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .my-tab .active { background: #f093fb; color: white; }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 8px; padding: 15px; text-align: center; }
            .header h1 { font-size: 18px; }
            .container { margin: 12px auto; }
            .reward-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .reward-card { padding: 14px; }
            .reward-icon { font-size: 36px; }
            .reward-price { font-size: 18px; }
            .top-bar { flex-direction: column; align-items: flex-start; }
            .balance-badge { align-self: flex-start; }
            table { font-size: 12px; }
            th, td { padding: 8px 6px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎁 积分商城</h1>
        <div class="nav-links">
            <a href="/worker">返回首页</a>
            <a href="/logout">退出登录</a>
        </div>
    </div>

    <div class="container">
        <div class="top-bar">
            <h2>✨ 可用奖励</h2>
            <div class="balance-badge">⭐ <span id="pointsBalance">0</span> 积分</div>
        </div>

        <div class="reward-grid" id="rewardGrid">
            <div class="empty-message" style="grid-column:1/-1;" th:if="${rewards.isEmpty()}">
                暂无上架的奖励，让家长去商城添加吧！
            </div>
            <div class="reward-card" th:each="r : ${rewards}"
                 th:attr="onclick='showRedeemModal(' + ${r.id} + ', `' + ${r.name} + '`, ' + ${r.costPoints} + ', `' + ${r.description} + '`)'">
                <div class="reward-icon">🎮</div>
                <div class="reward-name" th:text="${r.name}">奖励名称</div>
                <div class="reward-desc" th:text="${r.description}">说明</div>
                <div class="reward-price" th:text="${r.costPoints}">50</div>
                <div class="reward-price-label">积分</div>
                <div class="reward-stock" th:if="${r.stock != null}" th:text="'剩余 ' + ${r.stock} + ' 份'"></div>
                <button class="redeem-btn" th:disabled="${r.stock != null && r.stock < 1}">兑换</button>
            </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div class="section-title" style="margin-bottom:0;">📋 我的兑换记录</div>
            <a href="/child/mall/treasure" style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white;text-decoration:none;padding:8px 20px;border-radius:25px;font-size:14px;font-weight:600;">📦 我的宝箱</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>奖励</th>
                    <th>积分</th>
                    <th>数量</th>
                    <th>申请时间</th>
                    <th>核销时间</th>
                    <th>状态</th>
                    <th>备注</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${myRedemptions.totalElements == 0}">
                    <td colspan="7" class="empty-message">还没有兑换记录</td>
                </tr>
                <tr th:each="r : ${myRedemptions.content}">
                    <td th:text="${r.rewardName}"></td>
                    <td th:text="${r.totalPoints}"></td>
                    <td th:text="${r.quantity}"></td>
                    <td th:text="${#temporals.format(r.createdAt, 'MM-dd HH:mm')}"></td>
                    <td th:text="${r.verifiedAt != null ? #temporals.format(r.verifiedAt, 'MM-dd HH:mm') : '-'}"></td>
                    <td th:class="${r.status == 'APPROVED' ? 'status-approved' : (r.status == 'REJECTED' ? 'status-rejected' : (r.status == 'PENDING' ? 'status-pending' : 'status-pending'))}"
                        th:text="${r.statusLabel}"></td>
                    <td th:text="${r.reviewRemark}"></td>
                </tr>
            </tbody>
        </table>
        <div th:replace="fragments/pagination :: pagination(${myRedemptions}, '/child/mall')"></div>
    </div>

    <div id="redeemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalRewardName">奖励名称</h3>
            <p id="modalRewardDesc" style="color:#999;font-size:13px;">说明</p>
            <div class="modal-price" id="modalPoints">50 积分</div>
            <input type="number" id="modalQuantity" value="1" min="1" style="width:80px;padding:8px;border:2px solid #e0e0e0;border-radius:10px;text-align:center;font-size:16px;margin:8px auto;display:block;">
            <textarea id="modalRemark" class="remark-input" rows="2" placeholder="备注（可选）"></textarea>
            <div style="margin-top:8px;font-size:13px;color:#888;">可用余额: <span id="modalBalance">0</span> 积分</div>
            <div class="modal-buttons">
                <button onclick="hideRedeemModal()" class="cancel-btn">取消</button>
                <button onclick="submitRedemption()" class="confirm-btn" id="confirmBtn">确认兑换</button>
            </div>
        </div>
    </div>

    <script>
        let currentRewardId = null;
        let currentCostPoints = 0;
        let currentBalance = 0;

        function showRedeemModal(id, name, costPoints, description) {
            currentRewardId = id;
            currentCostPoints = costPoints;
            document.getElementById('modalRewardName').textContent = name;
            document.getElementById('modalRewardDesc').textContent = description || '';
            document.getElementById('modalPoints').textContent = costPoints + ' 积分 / 份';
            document.getElementById('modalQuantity').value = 1;
            document.getElementById('modalRemark').value = '';
            document.getElementById('modalBalance').textContent = currentBalance;
            document.getElementById('confirmBtn').disabled = false;
            document.getElementById('confirmBtn').textContent = '确认兑换';
            document.getElementById('redeemModal').style.display = 'flex';
        }

        function hideRedeemModal() {
            document.getElementById('redeemModal').style.display = 'none';
            currentRewardId = null;
        }

        function submitRedemption() {
            const quantity = parseInt(document.getElementById('modalQuantity').value) || 1;
            const remark = document.getElementById('modalRemark').value;
            const total = quantity * currentCostPoints;

            if (total > currentBalance) {
                alert('积分不足！需要 ' + total + ' 积分，当前只有 ' + currentBalance + ' 积分');
                return;
            }

            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').textContent = '提交中...';

            fetch('/child/mall/redeem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rewardId: currentRewardId, quantity: quantity, remark: remark })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    location.reload();
                } else {
                    alert('兑换失败: ' + (data.message || '未知错误'));
                    document.getElementById('confirmBtn').disabled = false;
                    document.getElementById('confirmBtn').textContent = '确认兑换';
                }
            })
            .catch(() => {
                alert('网络错误，请重试');
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('confirmBtn').textContent = '确认兑换';
            });
        }

        fetch('/child/mall/balance')
            .then(r => r.json())
            .then(data => {
                currentBalance = data.balance;
                document.getElementById('pointsBalance').textContent = data.balance;
            });
    </script>
</body>
</html>
